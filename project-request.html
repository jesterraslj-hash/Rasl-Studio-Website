<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Request | Rasl Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f4f1;
--text:#111;
--muted:#666;
--line:rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(800px,90%);
margin:auto;
padding:80px 0;
}

.small{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:15px;
}

h1{
font-size:clamp(2.5rem,6vw,4rem);
margin-bottom:20px;
line-height:1;
}

.intro{
color:var(--muted);
line-height:1.8;
margin-bottom:40px;
}

.form-card{
background:#fff;
padding:40px;
border-radius:24px;
border:1px solid var(--line);
box-shadow:0 15px 40px rgba(0,0,0,.05);
}

.form-group{
margin-bottom:24px;
}

label{
display:block;
font-weight:600;
margin-bottom:10px;
}

input,
select,
textarea{
width:100%;
padding:16px;
border:1px solid rgba(0,0,0,.1);
border-radius:12px;
font-size:16px;
font-family:inherit;
}

textarea{
min-height:160px;
resize:vertical;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:999px;
background:#111;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.back-link{
display:inline-block;
margin-bottom:30px;
text-decoration:none;
color:#111;
font-weight:600;
}

@media(max-width:768px){

.form-card{
padding:24px;
}

}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-link">
← Back to Homepage
</a>

<div class="small">
PROJECT REQUEST FORM
</div>

<h1>Start Your Design Project</h1>

<p class="intro">
Complete this short form and Rasl Studio will review your request and contact you with the next steps.
</p>

<div class="form-card">

<form id="projectForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullName" required>
</div>

<div class="form-group">
<label>Business Name</label>
<input type="text" id="businessName">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>WhatsApp Number</label>
<input type="tel" id="whatsapp" required>
</div>

<div class="form-group">
<label>Service Needed</label>

<select id="service" required>
<option value="">Select Service</option>
<option>Logo Design</option>
<option>Brand Identity</option>
<option>Social Media Design</option>
<option>Poster Design</option>
<option>Other</option>
</select>

</div>

<div class="form-group">
<label>Budget</label>

<select id="budget" required>
<option value="">Select Budget</option>
<option>Under M300</option>
<option>M300 - M500</option>
<option>M800 - M1200</option>
<option>Above M1200</option>
</select>

</div>

<div class="form-group">
<label>Project Description</label>

<textarea id="description" placeholder="Tell us about your project..." required></textarea>

</div>
<p id="statusMessage"></p>
<button type="submit">
Submit Project Request
</button>

</form>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgqYvZpddb_B38Rvx0-C3rMBHVq1E1lAo",
  authDomain: "rasl-studio-d39c1.firebaseapp.com",
  projectId: "rasl-studio-d39c1",
  storageBucket: "rasl-studio-d39c1.firebasestorage.app",
  messagingSenderId: "807786864382",
  appId: "1:807786864382:web:6bcdfe6617f7af61500faf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("projectForm");
const statusMessage = document.getElementById("statusMessage");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  statusMessage.textContent = "Submitting request...";

  try {

    await addDoc(collection(db, "projectRequests"), {

      fullName: document.getElementById("fullName").value,
      businessName: document.getElementById("businessName").value,
      email: document.getElementById("email").value,
      whatsapp: document.getElementById("whatsapp").value,
      service: document.getElementById("service").value,
      budget: document.getElementById("budget").value,
      description: document.getElementById("description").value,
      submittedAt: new Date().toISOString()

    });

    statusMessage.textContent = "Project request submitted successfully.";

    form.reset();

  } catch (error) {

    console.error(error);

    statusMessage.textContent =
      "Submission failed. Please try again.";

  }

});

</script>
</body>
</html>
