<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Rasl Studio</title>

<style>


body{
font-family:Arial,sans-serif;
background:#f6f4f1;
padding:40px;
margin:0;
}

h1{
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:10px;
}

.label{
font-weight:bold;
}

#statsCard{
background:white;
padding:24px;
border-radius:20px;
margin-bottom:30px;
border:1px solid rgba(0,0,0,.08);
box-shadow:0 10px 30px rgba(0,0,0,.04);
}

#statsCard h2{
margin-bottom:12px;
}

#statsCard p{
margin:8px 0;
font-weight:600;
}

#serviceStats{
margin-top:15px;
padding-top:15px;
border-top:1px solid rgba(0,0,0,.08);
}

#serviceStats p{
margin:6px 0;
font-weight:500;
} 

.status-buttons{
margin-top:15px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.status-buttons button{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
font-weight:600;
}

.status-badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:13px;
font-weight:600;
margin-top:5px;
}

.status-new{
background:#fff3cd;
}

.status-contacted{
background:#d1ecf1;
}

.status-progress{
background:#d4edda;
}

.status-completed{
background:#c3e6cb;
}

.delete-section{
margin-top:15px;
}

.delete-btn{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
width:100%;
}

.dashboard-cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:25px;
}

.summary-card{
background:#fff;
padding:20px;
border-radius:16px;
border:1px solid rgba(0,0,0,.08);
text-align:center;
}

.summary-card h3{
font-size:14px;
margin-bottom:10px;
}

.summary-card p{
font-size:28px;
font-weight:700;
}

.search-section{
margin-bottom:25px;
}

#searchInput{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(0,0,0,.1);
font-size:16px;
}

#recentActivity{
margin-top:15px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,.04);
font-size:14px;
}

</style>
</head>

<body>

<h1>Project Requests</h1>

<button id="logoutBtn">
Logout
</button>

<div id="statsCard">

<h2>Dashboard Statistics</h2>

<div class="dashboard-cards">

<div class="summary-card">
<h3>Total</h3>
<p id="totalCard">0</p>
</div>

<div class="summary-card">
<h3>New</h3>
<p id="newCard">0</p>
</div>

<div class="summary-card">
<h3>In Progress</h3>
<p id="progressCard">0</p>
</div>

<div class="summary-card">
<h3>Completed</h3>
<p id="completedCard">0</p>
</div>

<div class="summary-card">
<h3>Pending Contact</h3>
<p id="pendingCard">0</p>
</div>

</div>

<p id="totalRequests">
Total Requests: 0
</p>

<p id="latestRequest">
Latest Request: -
</p>

<div id="recentActivity">
No recent activity
</div>

<h3>Services Breakdown</h3>

<div id="serviceStats">
Loading...
</div>

</div>

<div class="search-section">

<input
type="text"
id="searchInput"
placeholder="Search by name, email, service...">

</div>

<div id="requestsContainer">

Loading requests...

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

alert("Script loaded");

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgqYvZpddb_B38Rvx0-C3rMBHVq1E1lAo",
  authDomain: "rasl-studio-d39c1.firebaseapp.com",
  projectId: "rasl-studio-d39c1",
  storageBucket: "rasl-studio-d39c1.firebasestorage.app",
  messagingSenderId: "807786864382",
  appId: "1:807786864382:web:6bcdfe6617f7af61500faf"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);
let allRequests = [];
const logoutBtn =
document.getElementById("logoutBtn");
logoutBtn.addEventListener("click", async () => {

await signOut(auth);

window.location.href = "login.html";

});

const container =
document.getElementById("requestsContainer");

const totalRequests =
document.getElementById("totalRequests");

const totalCard =
document.getElementById("totalCard");

const newCard =
document.getElementById("newCard");

const progressCard =
document.getElementById("progressCard");

const pendingCard =
document.getElementById("pendingCard");

const completedCard =
document.getElementById("completedCard");

const latestRequest =
document.getElementById("latestRequest");

const searchInput =
document.getElementById("searchInput");

const serviceStats =
document.getElementById("serviceStats");

async function loadRequests(){

alert("loadRequests started");

container.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"projectRequests"));

console.log("Documents:", querySnapshot.size);

allRequests = [];

querySnapshot.forEach((docItem)=>{

allRequests.push({
id: docItem.id,
...docItem.data()
});

});

alert("Requests loaded: " + allRequests.length);

console.log("Loaded Requests:", allRequests);

allRequests.sort((a,b)=>{

return new Date(b.submittedAt || 0)

new Date(a.submittedAt || 0);

});

totalRequests.textContent =
"Total Requests: ${allRequests.length}";

let newCount = 0;
let progressCount = 0;
let completedCount = 0;
let pendingCount = 0;

allRequests.forEach((request)=>{

const status =
request.status || "New";

if(status === "New"){

newCount++;
pendingCount++;

}

if(status === "In Progress"){

progressCount++;

}

if(status === "Completed"){

completedCount++;

}

});

totalCard.textContent =
allRequests.length;

newCard.textContent =
newCount;

progressCard.textContent =
progressCount;

completedCard.textContent =
completedCount;

pendingCard.textContent =
pendingCount;

const services = {};

allRequests.forEach((request)=>{

const service =
request.service || "Unknown";

services[service] =
(services[service] || 0) + 1;

});

serviceStats.innerHTML = "";

for(const service in services){

serviceStats.innerHTML += `

<p>${service}: ${services[service]}</p>
`;}

if(allRequests.length > 0){

latestRequest.textContent =
"Latest Request: ${ new Date( allRequests[0].submittedAt ).toLocaleString() }";

const recentActivity =
document.getElementById("recentActivity");

recentActivity.textContent =
"${allRequests[0].fullName || "Client"} submitted a ${allRequests[0].service || "project"} request.";

}

allRequests.forEach((data)=>{

container.innerHTML += `

<div class="card"><h3>${data.fullName || "No Name"}</h3><p>
<span class="label">Business:</span>
${data.businessName || "-"}
</p><p>
<span class="label">Email:</span>
${data.email || "-"}
</p><p>
<span class="label">WhatsApp:</span>
${data.whatsapp || "-"}
</p><p>
<span class="label">Service:</span>
${data.service || "-"}
</p><p>
<span class="label">Budget:</span>
${data.budget || "-"}
</p><p>
<span class="label">Description:</span>
${data.description || "-"}
</p><p>
<span class="label">Status:</span><span class="status-badge
${
(data.status || "New") === "New"
? "status-new"
: (data.status === "Contacted")
? "status-contacted"
: (data.status === "In Progress")
? "status-progress"
: "status-completed"
}">
${data.status || "New"}
</span>

</p><div class="status-buttons"><button onclick="updateStatus('${data.id}','Contacted')">
Contacted
</button><button onclick="updateStatus('${data.id}','In Progress')">
In Progress
</button><button onclick="updateStatus('${data.id}','Completed')">
Completed
</button></div><div class="delete-section"><button
class="delete-btn"
onclick="deleteRequest('${data.id}')">

Delete Request

</button></div><p>
<span class="label">Submitted:</span>
${data.submittedAt
? new Date(data.submittedAt).toLocaleString()
: "-"}
</p></div>`;

});

}

window.updateStatus = async function(id,status){

try{

await updateDoc(
doc(db,"projectRequests",id),
{
status:status
}
);

loadRequests();

}catch(error){

console.error(error);

}

}

window.deleteRequest = async function(id){

const confirmed =
confirm(
"Are you sure you want to delete this request?"
);

if(!confirmed) return;

try{

await deleteDoc(
doc(db,"projectRequests",id)
);

loadRequests();

}catch(error){

console.error(error);

}

}

onAuthStateChanged(auth, (user) => {

if(user){

loadRequests();

}else{

window.location.href = "login.html";

}

});

</script>

</body>
</html>
