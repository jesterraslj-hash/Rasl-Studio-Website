<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RASL Studio Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
color:#333;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
}

.logout-btn{
background:#111;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.logout-btn:hover{
opacity:.9;
}

.dashboard-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.stat-card h3{
font-size:14px;
margin-bottom:10px;
color:#666;
}

.stat-card p{
font-size:28px;
font-weight:bold;
}

.search-box{
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.section-card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.section-card h2{
margin-bottom:15px;
}

.request-card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.request-card h3{
margin-bottom:10px;
}

.request-card p{
margin-bottom:8px;
}

.label{
font-weight:bold;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
display:inline-block;
}

.status-new{
background:#fff3cd;
}

.status-contacted{
background:#d1ecf1;
}

.status-progress{
background:#d4edda;
}

.status-completed{
background:#c3e6cb;
}

.action-buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:15px;
}

.action-buttons button{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.contact-btn{
background:#17a2b8;
color:white;
}

.progress-btn{
background:#28a745;
color:white;
}

.complete-btn{
background:#6f42c1;
color:white;
}

.delete-btn{
background:#dc3545;
color:white;
}

.loading{
text-align:center;
padding:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<h1>RASL Studio Dashboard</h1>

<button
id="logoutBtn"
class="logout-btn">

Logout

</button>

</div>


<div class="dashboard-grid">

<div class="stat-card">
<h3>Total Requests</h3>
<p id="totalCount">0</p>
</div>

<div class="stat-card">
<h3>New</h3>
<p id="newCount">0</p>
</div>

<div class="stat-card">
<h3>Contacted</h3>
<p id="contactedCount">0</p>
</div>

<div class="stat-card">
<h3>In Progress</h3>
<p id="progressCount">0</p>
</div>

<div class="stat-card">
<h3>Completed</h3>
<p id="completedCount">0</p>
</div>

</div>



<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search by name, email, business or service...">

</div>



<div class="section-card">

<h2>Service Breakdown</h2>

<div id="serviceStats">

<div class="loading">

Loading...

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from
"https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc
}
from
"https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";



const firebaseConfig = {

apiKey:
"AIzaSyAgqYvZpddb_B38Rvx0-C3rMBHVq1E1lAo",

authDomain:
"rasl-studio-d39c1.firebaseapp.com",

projectId:
"rasl-studio-d39c1",

storageBucket:
"rasl-studio-d39c1.firebasestorage.app",

messagingSenderId:
"807786864382",

appId:
"1:807786864382:web:6bcdfe6617f7af61500faf"

};



const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);



let allRequests = [];



onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

loadRequests();

});



document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{

await signOut(auth);

window.location.href =
"login.html";

});

async function loadRequests(){

const requestsContainer =
document.getElementById(
"requestsContainer"
);

const serviceStats =
document.getElementById(
"serviceStats"
);

try{

requestsContainer.innerHTML =
'<div class="loading">Loading requests...</div>';

const querySnapshot =
await getDocs(
collection(db,"projectRequests")
);

allRequests = [];

querySnapshot.forEach((docItem)=>{

allRequests.push({
id: docItem.id,
...docItem.data()
});

});


allRequests.sort((a,b)=>{

return (
new Date(b.submittedAt || 0) -
new Date(a.submittedAt || 0)
);

});


updateStatistics();

renderServiceBreakdown();

renderRequests(allRequests);

}
catch(error){

console.error(error);

requestsContainer.innerHTML =

`<div class="loading">

Failed to load requests.

</div>`;

}

}



function updateStatistics(){

const total =
allRequests.length;

const newCount =
allRequests.filter(item=>

(item.status || "New")
=== "New"

).length;

const contactedCount =
allRequests.filter(item=>

item.status ===
"Contacted"

).length;

const progressCount =
allRequests.filter(item=>

item.status ===
"In Progress"

).length;

const completedCount =
allRequests.filter(item=>

item.status ===
"Completed"

).length;



document.getElementById(
"totalCount"
).textContent = total;

document.getElementById(
"newCount"
).textContent = newCount;

document.getElementById(
"contactedCount"
).textContent =
contactedCount;

document.getElementById(
"progressCount"
).textContent =
progressCount;

document.getElementById(
"completedCount"
).textContent =
completedCount;



const recentActivity =
document.getElementById(
"recentActivity"
);

if(allRequests.length){

recentActivity.textContent =

`${allRequests[0].fullName || "Client"}
submitted a
${allRequests[0].service || "project"}
request.`;

}else{

recentActivity.textContent =
"No recent activity.";

}

}



function renderServiceBreakdown(){

const serviceStats =
document.getElementById(
"serviceStats"
);

if(!allRequests.length){

serviceStats.innerHTML =
"No requests available.";

return;

}

const counts = {};

allRequests.forEach(item=>{

const service =
item.service ||
"Unknown";

counts[service] =
(counts[service] || 0)
+ 1;

});

let html = "";

Object.entries(counts)
.forEach(([service,count])=>{

html += `

<p>

<strong>${service}</strong>

(${count})

</p>

`;

});

serviceStats.innerHTML =
html;

}



function renderRequests(data){

const container =
document.getElementById(
"requestsContainer"
);

if(!data.length){

container.innerHTML =

`<div class="loading">

No requests found.

</div>`;

return;

}

container.innerHTML = "";

data.forEach((item)=>{

container.innerHTML += `

<div class="request-card">

<h3>
${item.fullName || "No Name"}
</h3>

<p>

<span class="label">
Business:
</span>

${item.businessName || "-"}

</p>

<p>

<span class="label">
Email:
</span>

${item.email || "-"}

</p>

<p>

<span class="label">
WhatsApp:
</span>

${item.whatsapp || "-"}

</p>

<p>

<span class="label">
Service:
</span>

${item.service || "-"}

</p>

<p>

<span class="label">
Budget:
</span>

${item.budget || "-"}

</p>

<p>

<span class="label">
Description:
</span>

${item.description || "-"}

</p>

<p>

<span class="label">
Status:
</span>

<span class="status
${getStatusClass(item.status)}">

${item.status || "New"}

</span>

</p>

<div class="action-buttons">

<button
class="contact-btn"
onclick="updateStatus('${item.id}','Contacted')">

Contacted

</button>

<button
class="progress-btn"
onclick="updateStatus('${item.id}','In Progress')">

In Progress

</button>

<button
class="complete-btn"
onclick="updateStatus('${item.id}','Completed')">

Completed

</button>

<button
class="delete-btn"
onclick="deleteRequest('${item.id}')">

Delete

</button>

</div>

</div>

`;

});

}

function getStatusClass(status){

switch(status){

case "Contacted":
return "status-contacted";

case "In Progress":
return "status-progress";

case "Completed":
return "status-completed";

default:
return "status-new";

}

}



document
.getElementById("searchInput")
.addEventListener("input",(e)=>{

const search =
e.target.value.toLowerCase();

const filtered =
allRequests.filter(item=>{

return (

(item.fullName || "")
.toLowerCase()
.includes(search)

||

(item.businessName || "")
.toLowerCase()
.includes(search)

||

(item.email || "")
.toLowerCase()
.includes(search)

||

(item.service || "")
.toLowerCase()
.includes(search)

);

});

renderRequests(filtered);

});



window.updateStatus =
async function(id,status){

try{

await updateDoc(

doc(
db,
"projectRequests",
id
),

{
status: status
}

);

loadRequests();

}
catch(error){

console.error(error);

alert(
"Failed to update status."
);

}

};



window.deleteRequest =
async function(id){

const confirmed =
confirm(
"Delete this request?"
);

if(!confirmed){
return;
}

try{

await deleteDoc(

doc(
db,
"projectRequests",
id
)

);

loadRequests();

}
catch(error){

console.error(error);

alert(
"Failed to delete request."
);

}

};

</script>

</body>
</html>
