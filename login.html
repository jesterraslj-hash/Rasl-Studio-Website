<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Rasl Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f4f1;
--text:#111;
--muted:#666;
--line:rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:500px;
padding:40px;
border-radius:24px;
border:1px solid var(--line);
box-shadow:0 15px 40px rgba(0,0,0,.05);
}

.small{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:15px;
}

h1{
margin-bottom:15px;
}

p{
color:var(--muted);
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:16px;
border:1px solid rgba(0,0,0,.1);
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:999px;
background:#111;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#message{
margin-top:20px;
font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<div class="small">
ADMIN LOGIN
</div>

<h1>Welcome Back</h1>

<p>
Sign in to access the Rasl Studio dashboard.
</p>

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">
Login
</button>

</form>

<div id="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgqYvZpddb_B38Rvx0-C3rMBHVq1E1lAo",
  authDomain: "rasl-studio-d39c1.firebaseapp.com",
  projectId: "rasl-studio-d39c1",
  storageBucket: "rasl-studio-d39c1.firebasestorage.app",
  messagingSenderId: "807786864382",
  appId: "1:807786864382:web:6bcdfe6617f7af61500faf"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const form = document.getElementById("loginForm");

const message = document.getElementById("message");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

try{

await signInWithEmailAndPassword(
auth,
document.getElementById("email").value,
document.getElementById("password").value
);

message.textContent = "Login successful...";

window.location.href = "admin.html";

}
catch(error){

message.textContent =
"Incorrect email or password.";

}

});

</script>

</body>
</html>
